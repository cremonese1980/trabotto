entities:
  - id: BULL_PRINCIPIANTI_101
    entity_type: GUIDELINE
    scope: GLOBAL

    tags:
      - order_book
      - education
      - beginner

    source:
      timecode: "01:36-02:40"

    statement: "Il book è la rappresentazione in tempo reale delle proposte di acquisto e vendita."

    applicability:
      timeframes: [1m, 5m, 15m]
      market_regime: RANGE
      session: ANY

    rationale:
      - "Bull utilizza un’analogia immobiliare per spiegare domanda e offerta."

    notes:
      - "Il concetto è generalizzabile a qualsiasi mercato."

  - id: BULL_PRINCIPIANTI_102
    entity_type: RULE
    scope: PRE_FILTER
    severity: HARD

    tags:
      - order_book
      - liquidity
      - execution

    source:
      timecode: "04:22-05:31"

    condition:
      - order_queue_length > THRESHOLD
    action:
      - DECREASE_EXECUTION_PROBABILITY

    statement: "Più proposte sono davanti a un prezzo, minore è la probabilità di esecuzione rapida."

    applicability:
      timeframes: [1m, 5m, 15m]
      market_regime: RANGE
      session: ANY

    rationale:
      - "Livelli lontani dal prezzo indicano bassa urgenza operativa."

    notes:
      - "Concetto di coda nel book."

  - id: BULL_PRINCIPIANTI_103
    entity_type: RULE
    scope: LIQUIDITY_GATE
    severity: HARD

    tags:
      - order_book
      - urgency
      - price_pressure

    source:
      timecode: "06:29-07:57"

    condition:
      - seller_urgency > buyer_urgency
    action:
      - EXPECT_PRICE_DECREASE

    statement: "Quando i venditori hanno maggiore urgenza dei compratori, il prezzo tende a scendere."

    applicability:
      timeframes: [1m, 5m, 15m]
      market_regime: TREND
      session: ANY

    rationale:
      - "Bull descrive il deprezzamento progressivo per ottenere esecuzione."

    notes:
      - "Regola di interpretazione, non azione del sistema."

  - id: BULL_PRINCIPIANTI_104
    entity_type: RULE
    scope: LIQUIDITY_GATE
    severity: HARD

    tags:
      - order_book
      - urgency
      - price_pressure

    source:
      timecode: "12:36-13:44"

    condition:
      - buyer_urgency > seller_urgency
    action:
      - EXPECT_PRICE_INCREASE

    statement: "Quando i compratori hanno urgenza e i venditori sono statici, il prezzo sale rapidamente."

    applicability:
      timeframes: [1m, 5m, 15m]
      market_regime: HIGH_VOL
      session: ANY

    rationale:
      - "Esempio di spike generato da domanda improvvisa."

    notes:
      - "Evento esogeno improvviso."

  - id: BULL_PRINCIPIANTI_105
    entity_type: WARNING
    scope: AI_DECISION_SUPPORT

    tags:
      - order_book
      - liquidity
      - warning

    source:
      timecode: "10:01-11:08"

    statement: "Un singolo compratore parziale non garantisce l’esecuzione completa del livello."

    applicability:
      timeframes: [1m, 5m, 15m]
      market_regime: RANGE
      session: ANY

    rationale:
      - "Bull spiega che non tutti gli ordini coprono l’intera quantità."

    notes:
      - "Esempio del compratore parziale (garage)."

  - id: BULL_PRINCIPIANTI_106
    entity_type: INVALIDATION
    scope: MONITORING
    severity: HARD

    tags:
      - order_book
      - invalidation
      - execution

    source:
      timecode: "16:45-17:04"

    condition:
      - perceived_urgency == HIGH
      - executed_volume == LOW
    action:
      - INVALIDATE_DIRECTIONAL_READ

    statement: "Se l’urgenza nel book non produce esecuzioni, la lettura direzionale è invalida."

    applicability:
      timeframes: [1m, 5m, 15m]
      market_regime: RANGE
      session: ANY

    rationale:
      - "Il prezzo si muove solo con esecuzioni reali."

    notes:
      - "Fondamentale per evitare falsi segnali."

  - id: BULL_PRINCIPIANTI_107
    entity_type: GUIDELINE
    scope: AI_DECISION_SUPPORT

    tags:
      - order_book
      - trend
      - urgency

    source:
      timecode: "16:49-17:31"

    statement: "Seguire il trend significa seguire l’urgenza dominante nel book."

    applicability:
      timeframes: [1m, 5m, 15m]
      market_regime: TREND
      session: ANY

    rationale:
      - "Bull collega book, spike e trend."

    notes:
      - "Le medie mobili come proxy dell’urgenza."

summary:
  core_message: "Il prezzo si muove in base all’urgenza relativa tra compratori e venditori; il book rende visibile questo squilibrio in tempo reale."
