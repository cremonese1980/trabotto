    applicability:
      timeframes: [1m, 5m, 30m]
      market_regime: []
    rationale: "On a second touch, there must be at least one candela di riposo (rest candle) before the touch. Without it, the setup lacks the compression needed for a clean breakout."
    notes: "First trade lost 35 BUSD because the 2nd touch lacked a candela di riposo. Bull emphasizes this as a hard filter for secondo tocco entries."

  - id: BULL_LTCRA_02_02
