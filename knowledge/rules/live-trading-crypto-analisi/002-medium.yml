    scope: MONITORING
    severity: HARD
    tags: [candelina, breakout, scalping]
    source:
      timecode: "~"
    conditions:
      - position_open == true
      - candle_nearing_close == true
      - acceleration_in_denaro == false
    action:
      - EXIT_POSITION
    applicability:
      timeframes: [1m, 5m]
      market_regime: []
    rationale: "When approaching the end of a candle, the price must show acceleration in denaro (buying pressure). If there is no acceleration, exit immediately."
    notes: "Bull lost on the first trade because price did not accelerate into the candle close. The candle must finish strong or the setup is failing."

