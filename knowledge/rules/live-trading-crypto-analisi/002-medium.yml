    statement: "On a secondo tocco entry, the trade must start immediately and move in your direction. If it stalls or hesitates, close the position. The secondo tocco demands instant confirmation."
    rationale: "The secondo tocco has less compression than terzo tocco, so it relies on immediate momentum. Any hesitation signals the setup is not working."

summary:
