    applicability:
      timeframes: [1m, 5m]
      market_regime: []
    rationale: "Once in profit, move stop to zero (breakeven). EMA 10 then serves as the dynamic trailing stop for ongoing management."
    notes: "Stop at zero is the first priority once profit appears. Then EMA 10 candle close becomes the active dynamic stop for the remainder of the trade."

  - id: BULL_LTCRA_02_05
