    applicability:
      timeframes: [1m, 5m, 30m]
      market_regime: []
    rationale: "Terzo tocco (third touch) and quarto tocco (fourth touch) are more reliable than secondo tocco. The multiple compressions build energy for a cleaner breakout."
    notes: "Second trade was a terzo/quarto tocco that yielded 3% gain on a 15k position. Bull considers terzo tocco significantly more reliable than secondo tocco."

  - id: BULL_LTCRA_02_04
    entity_type: RULE
