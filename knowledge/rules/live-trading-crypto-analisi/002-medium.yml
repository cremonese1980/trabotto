      timeframes: [1m, 5m]
      market_regime: []
    rationale: "Analyze both USDT and BUSD order books to identify muri (walls). The muro serves as the reference level for entry and exit targets."
    notes: "Bull checks both pairs to get a complete picture. A muro visible on one pair but not the other still counts but requires extra caution."

