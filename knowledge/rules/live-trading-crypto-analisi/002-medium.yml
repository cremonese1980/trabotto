    statement: "Terzo tocco is significantly more reliable than secondo tocco. When a secondo tocco fails, look for the terzo tocco at the same level as the next opportunity."
    rationale: "Each additional touch compresses price further and attracts more participants, making the eventual breakout more powerful."

  - id: BULL_LTCRA_02_CTX_02
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [book, take_profit, scalping]
    source:
      timecode: "~"
    statement: "Use iceberg orders for exit to avoid showing full size on the book. This prevents other traders from front-running your exit."
    rationale: "Large visible exit orders attract predatory trading. Iceberg hides the true size and allows gradual fills at the target price."

  - id: BULL_LTCRA_02_CTX_03
