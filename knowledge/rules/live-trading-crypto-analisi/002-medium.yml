  core_message: "Secondo tocco requires a candela di riposo before entry and must accelerate into candle close. Terzo tocco is far more reliable. Use dual book analysis (USDT/BUSD) for muro identification. Iceberg orders for exit. Stop at zero once in profit, EMA 10 as dynamic stop."
