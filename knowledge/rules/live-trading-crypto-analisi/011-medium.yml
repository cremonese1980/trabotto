    statement: "A muro at the daily high has higher probability of being broken than a muro at a random level. When the muro is not at the daily high, it is more likely to hold, so set take profit before it rather than betting on a breakout."
    rationale: "Daily highs attract breakout triggers and stop-loss cascades. Muri at these levels are more likely to be consumed. Muri elsewhere lack this catalyst and tend to hold as resistance."

