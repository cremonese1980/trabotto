    applicability:
      timeframes: [1m, 5m]
      market_regime: []
    rationale: "Buy on upward breakout of the lateral channel. Entry is at the close of the candle body above resistance (not above the spike high)."
    notes: "Stop is below the minimum spike low of the lateral channel. Tight stop is the main advantage of this technique."

