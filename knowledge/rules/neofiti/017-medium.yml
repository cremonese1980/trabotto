      - book_wall_at_channel_boundary == true
    action:
      - MONITOR_LEVEL
    applicability:
      timeframes: [1m, 5m]
      market_regime: []
    rationale: "Validate both channel boundaries (support and resistance) in the order book — a large wall confirms the level as real. Without book validation, use the graphical level directly."
    notes: "Example: channel support at 2.47 confirmed by book wall of 230 lots. Book gives the precise level and confirms whether a breakout is meaningful."

