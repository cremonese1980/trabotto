      - lateral_channel_breakout_direction == index_direction
    action:
      - REDUCE_SIZE
    applicability:
      timeframes: [1m, 5m]
      market_regime: []
    rationale: "When the breakout direction matches the index direction, the trade is partly driven by macro momentum — reduce size because the signal is weaker."
    notes: "Strongest breakouts: asset breaks independently of or against the index. These warrant larger size."

