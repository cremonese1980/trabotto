    statement: "During lateralization all EMAs become meaningless — they are all compressed at the same level. The only relevant levels are the channel top and bottom."
    rationale: "EMAs lose predictive power when price action is horizontal; only horizontal support/resistance provides actionable signals."

  - id: BULL_P_17_CTX_02
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [lateralizzazione, regime_filter, btc_index]
    source:
      timecode: "06:52-07:55"
    statement: "If the index (BTC/NASDAQ) is in a sell-off and the asset breaks channel support, this is a dangerous short — the move may reverse sharply when the index bounces."
    rationale: "Shorting with index momentum means you are riding macro selling; when the index reverses intraday the short can snap back violently."

  - id: BULL_P_17_CTX_03
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [lateralizzazione, candelina, scalping, psychology]
    source:
      timecode: "05:44-06:03"
    statement: "Small sequential daily candles accumulate tension like a compressed spring — breakout can go either direction but tends to be explosive."
    rationale: "The smaller and more uniform the candles during accumulation, the more energy stored for the eventual breakout."

summary:
  total_machine_executable: 6
  total_context_only: 3
  core_message: "Lateralizzazione technique: identify a channel where all EMAs are compressed, validate the channel boundaries in the order book, then trade the breakout of either boundary with the spike opposite as stop. Strongest signals are when the asset breaks independently of the index."
