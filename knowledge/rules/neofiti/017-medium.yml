      - breakout_direction == long
      - index_direction == flat OR index_direction == up
    action:
      - ENTER_LONG
    applicability:
      timeframes: [1m, 5m]
      market_regime: []
    rationale: "A lateral breakout to the upside is highest quality when the index (DAX/NASDAQ/BTC) is neutral or rising — the stock/asset is breaking out on its own strength."
    notes: "If the breakout is in the same direction as the index move, reduce size — the move may be index-driven and reverse when the index reverses."

