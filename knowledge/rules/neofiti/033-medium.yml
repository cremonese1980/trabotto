    statement: "Companies making a takeover bid (OPA) must accumulate shares slowly and quietly to avoid driving up the price. Large daily candles before official news signal that smart money has started accumulating — the conformazione appears before the news."
    rationale: "Understanding the accumulation mechanics helps traders recognize when large unexplained moves on a stock chart indicate early-stage corporate action."

