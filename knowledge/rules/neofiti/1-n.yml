video:
  id: YT_BULL_PRINCIPIANTI_001
  series: principianti
  title: "Prendere sul serio il trading: book, EMA e gestione del rischio per iniziare"
  video_index: 1
  duration_minutes: 15

entities:
  - id: BULL_P_01_01
    entity_type: RULE
    category: MACHINE_EXECUTABLE
    scope: PRE_FILTER
    severity: HARD
    tags: [beginner, leverage, risk_management, position_sizing]
    source:
      timecode: "09:35-10:21"
    conditions:
      - account_equity_usd <= 100
      - selected_leverage <= 10
      - position_margin_mode == ISOLATED
    action:
      - ENTER_LONG
    applicability:
      timeframes: []
      market_regime: []
    rationale: "Per chi inizia, Bull impone leva bassa e margine isolato per limitare la perdita massima della singola operazione."
    notes: "Regola valida anche per short. La parte operativa è il vincolo di configurazione prima di aprire la posizione."

  - id: BULL_P_01_02
    entity_type: INVALIDATION
    category: MACHINE_EXECUTABLE
    scope: TRADE_EXECUTION
    severity: HARD
    tags: [beginner, leverage, risk_management, stop_loss]
    source:
      timecode: "09:43-10:30"
    conditions:
      - selected_leverage == 10
      - isolated_margin_amount_usd == 10
      - price_move_against_position_pct >= 10
    action:
      - EXIT_POSITION
    applicability:
      timeframes: []
      market_regime: []
    rationale: "Con 10$ isolati a leva 10 la perdita massima deve rimanere confinata al margine allocato."
    notes: "Bull descrive esplicitamente l'hard stop come perdita massima su quella quota, non sull'intero saldo."

  - id: BULL_P_01_03
    entity_type: SETUP
    category: MACHINE_EXECUTABLE
    scope: MONITORING
    severity: SOFT
    tags: [book, trigger, breakout]
    source:
      timecode: "02:16-03:17"
    conditions:
      - horizontal_level_drawn == true
      - level_source == ORDER_BOOK_RESISTANCE
      - price_touches_level == true
    action:
      - MONITOR_LEVEL
    applicability:
      timeframes: []
      market_regime: []
    rationale: "Bull propone di marcare i livelli del book e osservare la reazione del prezzo al contatto."
    notes: "È un setup di osservazione/allenamento, non un ingresso automatico diretto."

  - id: BULL_P_01_04
    entity_type: INVALIDATION
    category: MACHINE_EXECUTABLE
    scope: PRE_FILTER
    severity: HARD
    tags: [ema60, trend, invalidation, short]
    source:
      timecode: "06:33-06:58"
    conditions:
      - ema60_role_changed_from_support_to_resistance == true
      - candle_close_below_ema60 == true
    action:
      - ENTER_SHORT
    applicability:
      timeframes: []
      market_regime: []
    rationale: "Quando EMA60 perde il ruolo di supporto e diventa resistenza, Bull considera valida l'ipotesi short."
    notes: "Trascrizione corretta: 'M60' interpretato come EMA60."

  - id: BULL_P_01_CTX_01
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [psychology, beginner, risk_management]
    source:
      timecode: "00:13-01:00"
    statement: "Il trading richiede anni di pratica e non va trattato come denaro facile."
    rationale: "Riduce aspettative irrealistiche e overtrading iniziale."

  - id: BULL_P_01_CTX_02
    entity_type: WARNING
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [psychology, beginner, risk_management]
    source:
      timecode: "04:08-04:20"
    statement: "Non iniziare con capitale elevato perché chi parte senza metodo tende a perdere rapidamente."
    rationale: "Invita a proteggere il capitale finché non si acquisisce competenza."

summary:
  total_machine_executable: 4
  total_context_only: 2
  core_message: "Il video imposta regole di sopravvivenza per neofiti: dimensionamento minimo, leva contenuta, margine isolato e lettura disciplinata di livelli book/EMA. La priorità è imparare prima di aumentare rischio e capitale."
