summary:
  total_machine_executable: 7
  total_context_only: 4
  core_message: "Il livello trigger è il punto dove la somma di ordini di acquisto e chiusure di short produce potenzialmente un'accelerazione: va testato con un ingresso anticipato, e il suo successo o fallimento (superamento di un tick senza accelerazione) va gestito con regole meccaniche precise di uscita e/o ribaltamento della posizione."
