  core_message: "Spiegazione delle EMA come indizi della scena del delitto: EMA 5/10/60/223 per crypto, 5/10/50/200 per equity. Le EMA funzionano come supporti a scalini; solo le chiusure candela contano, non gli spike. Si opera solo quando una EMA comanda in modo pulito e preciso."
