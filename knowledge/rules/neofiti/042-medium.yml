  core_message: "Una sessione fiscale strutturata con due commercialisti italiani copre il framework completo della tassazione crypto 2023 in Italia: la franchigia di 2.000 EUR, cosa costituisce un cash-out tassabile, l'obbligo di monitoraggio RW sempre obbligatorio, il condono volontario con scadenza al 30 settembre, una finestra di accertamento di 8 anni, e la non deducibilità delle perdite da truffe/fallimenti exchange."
