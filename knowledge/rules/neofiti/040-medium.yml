    tags: [book, stop_loss, risk_management]
    source:
      timecode: "07:49-08:12"
    statement: "Un grande muro in acquisto crea un vuoto sotto di sé: tutti i compratori si sono spostati sopra il muro, quindi se il muro viene rotto non c'è niente che fermi un crollo veloce del -30% perché i compratori che erano sotto sono andati via."
    rationale: "Più grande è il muro, più energia immagazzina e più catastrofico è il suo fallimento; la dimensione del muro è direttamente correlata alla gravità del crollo se viene rotto."

  - id: BULL_P_40_CTX_03
    entity_type: WARNING
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [book, risk_management, position_sizing]
    source:
      timecode: "11:41-12:01"
    statement: "Se hai problemi di connessione, sei in una zona con scarso segnale, o sei lento con le scorciatoie da tastiera, evita di tradare asset con grandi muri come stop principale — la finestra per uscire durante il consumo del muro può essere inferiore a un secondo."
    rationale: "Le uscite manuali durante il consumo del muro richiedono una reazione quasi istantanea; i vincoli tecnici che introducono latenza rendono questo metodo di gestione dello stop pericoloso."

summary:
  total_machine_executable: 5
  total_context_only: 3
  core_message: "Un Q&A dettagliato spiega come usare i grandi muri dell'order book come conferma di ingresso e riferimento per lo stop: comprare sopra un muro intatto, impostare uno stop-limit di sicurezza ben sotto di esso, ma uscire manualmente non appena il muro inizia a essere consumato — mai aspettare il consumo totale — e perché il book a piena profondità di Binance rende questa tecnica praticabile dove Forex e Nasdaq non possono."
