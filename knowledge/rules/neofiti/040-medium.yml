    applicability:
      timeframes: ["1min"]
      market_regime: []
    rationale: "Piazzare lo stop esattamente al prezzo del muro causa uscite premature sulle normali fluttuazioni; piazzarlo ben sotto significa che se l'uscita manuale fallisce, il limite cattura comunque i venditori in panico."
    notes: "Stop-limit molto basso (es. 7.20) come rete di sicurezza, non come meccanismo di uscita primario. L'uscita primaria è manuale quando il muro viene consumato."

