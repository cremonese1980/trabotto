  - id: BULL_P_26_CTX_01
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [psychology, beginner, risk_management]
    source:
      timecode: "05:10-08:10"
    statement: "Quando la giornata va molto bene all'inizio, è il momento più pericoloso: la sensazione di aver 'capito tutto' porta ad aumentare la size e ad entrare su conformazioni non valide, azzerando il gain."
    rationale: "L'euforia da guadagno abbassa la soglia di selezione dei trade e porta all'overtrading."

  - id: BULL_P_26_CTX_02
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [psychology, beginner]
    source:
      timecode: "08:03-09:17"
    statement: "Quando si inizia bene la giornata, la tecnica ottimale è chiudere il terminale del mercato specifico e tornare eventualmente dopo 2-4 ore con una mentalità fresca."
    rationale: "La separazione fisica dal mercato dopo un buon gain elimina la tentazione dell'overtrading."

  - id: BULL_P_26_CTX_03
    entity_type: WARNING
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [psychology, beginner, candelina]
    source:
      timecode: "12:32-13:28"
    statement: "Nelle giornate con candele molto piccole (candeline), non forzare operazioni. Non è necessario fare trading ogni giorno — solo quando ci sono le conformazioni adatte."
    rationale: "Forzare operazioni in assenza di movimento porta a frustrazioni, stop colpiti e perdite evitabili."

  - id: BULL_P_26_CTX_04
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [psychology, beginner, risk_management]
    source:
      timecode: "22:29-23:18"
    statement: "Accettare la perdita e chiudere in stop è un guadagno, perché riduce l'importo da recuperare. Una piccola perdita accettata subito impedisce che diventi una liquidazione."
    rationale: "I trader profittevoli a lungo termine sono quelli che sanno chiudere in perdita senza esitazione quando la conformazione lo richiede."

  - id: BULL_P_26_CTX_05
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [psychology, regime_filter, trend, daily]
    source:
      timecode: "19:50-21:45"
    statement: "Adattare la tecnica al regime di mercato: in mercato ribassista o laterale accontentarsi degli spike veloci; in bull run iniziare a lasciare correre le posizioni gradualmente, calibrandosi sull'andamento del daily."
    rationale: "La stessa tecnica applicata in regimi di mercato diversi produce risultati molto differenti; la flessibilità è una competenza chiave."

  - id: BULL_P_26_CTX_06
    entity_type: WARNING
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [psychology, position_sizing, book, beginner]
    source:
      timecode: "16:24-17:28"
    statement: "Prima di operare con qualsiasi size, imparare a leggere il book per capire se la size scelta è effettivamente eseguibile senza fare il buco e senza impattare il mercato in modo indesiderato."
    rationale: "Una size eccessiva rispetto alla liquidità disponibile nel book può rendere impossibile l'uscita al prezzo desiderato."

summary:
  total_machine_executable: 4
  total_context_only: 6
  core_message: "La redditività dipende da tre pilastri psicologico-operativi: rispettare le proporzioni tra range dell'asset e size, evitare l'overtrading sia nelle giornate negative che in quelle molto positive, e accettare la perdita come strumento di protezione del capitale — non come sconfitta."
