summary:
  total_machine_executable: 6
  total_context_only: 3
  core_message: "La candelina è la tecnica base obbligatoria per i neofiti: ingresso al massimo, stop al minimo, timeframe minimo 5 minuti. Lo stop si sposta solo dopo chiusura candela e va a breakeven dopo forte accelerazione. Per QUALSIASI conformazione tecnica è obbligatoria la presenza della candelina prima dell'ingresso."
