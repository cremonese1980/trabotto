    statement: "The EMA60 is a valid short reference only if it has been tested multiple times and respected; if price has already spiked above it, it is no longer a reference — the swing high above EMA60 becomes the stop level."
    rationale: "A tested and respected EMA60 provides a mechanical stop location; an EMA60 that has already been violated by a spike is too uncertain to use as stop and needs to be replaced by the actual swing high."

