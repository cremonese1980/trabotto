    statement: "Take profit is primarily proportional: the expected move should be roughly equal to the candle sizes in the prior conformazione. A small-candle setup on 1m targets a small move; a large 30m lateralization targets a much larger move."
    rationale: "Proportionality prevents over-expecting small setups and under-expecting large ones. The conformazione size sets the scale of the expected target."

