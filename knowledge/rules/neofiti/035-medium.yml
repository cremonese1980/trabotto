summary:
  total_machine_executable: 8
  total_context_only: 3
  core_message: "Take profit is set by three converging inputs: proportional move size based on prior candle sizes, the nearest overhead EMA, and the first major book wall above entry — whichever comes first wins, and the daily chart sets the overall scale for how ambitious the target can be."
