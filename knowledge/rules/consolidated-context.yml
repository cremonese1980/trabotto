  source:
    timecode: 07:00-08:00
  rationale: Beginners often enter too early on the cup, taking on unnecessary drawdown while the handle forms.
  notes: ''
  statement: In cup and handle patterns, the cup is context and the handle is the trade. Never enter on the cup formation
    itself. Wait for the handle to form and break out.
  source_files:
  - live-trading-crypto-analisi/009-medium.yml
- id: BULL_LTCRA_14_CTX_02
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - daily
  - breakout
  - identification
  source:
    timecode: '~'
  rationale: Compressed daily ranges represent equilibrium between buyers and sellers. When this equilibrium breaks, the move
    tends to be directional and significant. Early identification allows prepared entries via stop limit.
  notes: ''
  statement: Daily chart lateralizzazione with candelline (small bodies, low volatility) is a precursor to breakouts. Scan
    daily charts for this compressed range pattern and prepare stop limit orders at the breakout level.
  source_files:
  - live-trading-crypto-analisi/014-medium.yml
- id: BULL_LTCRA_26_CTX_03
  entity_type: WARNING
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - breakout_type
  - exit
  - beginner
  source:
    timecode: 04:00-05:00
  rationale: New-highs breakouts have no overhead supply (no trapped sellers above), allowing extended runs. Range breakouts
    face the resistance of the prior high, making immediate exit the safer strategy.
  notes: ''
  statement: The most common mistake is applying the same exit strategy to all breakouts. A new-highs breakout and a range
    breakout are fundamentally different trades. New highs = follow EMAs. Range breakout = sell immediately on first candle.
    Confusing the two costs money.
  source_files:
  - live-trading-crypto-analisi/026-medium.yml
- id: BULL_NN_07_CTX_01
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - trigger
  - breakout
  - beginner
  source:
    timecode: 07:16-08:15
  rationale: 'Spiega la meccanica reale dietro il punto trigger: esaurimento del venditore grosso.'
  notes: ''
  statement: 'Al livello trigger c''è un venditore grosso (milioni di dollari) che sta vendendo; quando finisce i suoi pezzi,
    il livello viene superato e si innesca l''esplosione con due correnti: nuovi long e chiusura degli short.'
  source_files:
  - nuova-neofiti/007-medium.yml
