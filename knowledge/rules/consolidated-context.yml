  rationale: Distinguere cause degli spike (ordini mercato) dai livelli che li fermano (grandi liquidità) è essenziale per
    capire dove può avvenire il prossimo rimbalzo.
  notes: ''
  statement: 'Gli spike sono ordini a mercato di persone con fretta: chi compra/vende a mercato spazzola tutti i livelli disponibili
    creando vuoto e poi il prezzo rimbalza dove trova la prossima liquidità. Gli spike non sono i pullman di cinesi stessi.'
  source_files:
  - neofiti/008-medium.yml
- id: BULL_N_08_CTX_03
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
