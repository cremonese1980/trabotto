  - trend
  source:
    timecode: 01:12-02:07
  rationale: Il movimento di prezzo è la base di ogni operazione di scalping.
  notes: ''
  statement: 'Capire perché e come il prezzo si muove è fondamentale: se il prezzo non si muove non esiste opportunità di
    trading.'
