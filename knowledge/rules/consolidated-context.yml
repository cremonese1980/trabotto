  source:
    timecode: 09:30-10:30
  rationale: Understanding the post-break rhythm allows traders to hold through the pause phase and exit before the next reversal.
  notes: ''
  statement: 'After a major support breaks: first panic (sharp drop), then normal breathing (small bounce/pause), then continuation
    down. This is the standard three-phase pattern of support failure.'
  source_files:
  - live-trading-crypto-analisi/006-medium.yml
- id: BULL_LTCRA_08_CTX_01
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
