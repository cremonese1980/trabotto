  source:
    timecode: 22:30-27:50
  rationale: Solo i livelli che vengono effettivamente mangiati dal prezzo sono reali e utilizzabili come riferimento operativo.
  notes: ''
  statement: 'Un livello grande nel book quasi eseguito che poi si toglie senza essere completamente mangiato è un livello
    ''quasi finto''. Un livello vero viene eseguito parzialmente: la quantità diminuisce quando il prezzo lo tocca.'
  source_files:
  - neofiti/008-medium.yml
- id: BULL_N_10_CTX_02
