  rationale: Il book è uno strumento che amplifica la qualità di un'analisi multi-timeframe già valida, non un trigger autonomo
    sufficiente a giustificare un ingresso.
  notes: ''
  statement: 'Non basta avere un livello nel book per fare un trade: serve una logica con più time frame che abbia senso.
    Il book da solo senza conformazione multi-timeframe non è sufficiente.'
