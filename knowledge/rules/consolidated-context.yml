  rationale: A candle that does nothing for your trade is a silent warning. On higher timeframes, wasted candles represent
    significant time without progress, and the longer a move stalls the more likely it is to reverse.
  notes: ''
  statement: Every candle must demonstrate something in the direction of the trade. If a candle fails to show progress or
    conviction, the trade thesis is weakening. This is especially important on the daily timeframe where each candle represents
    significant time.
  source_files:
  - live-trading-crypto-analisi/015-medium.yml
- id: BULL_LTCRA_15_CTX_02
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - error_acknowledgment
  - timing
  - exit
  source:
    timecode: '~'
  rationale: Delayed exits after stanchezza signals reduce profits. The first sign of fatigue (failure to make new extremes
    after strappo) is the optimal exit point, not the second or third confirmation.
  notes: ''
  statement: 'Bull acknowledges timing errors openly: recognizing when an exit should have happened earlier due to visible
    candle fatigue. The lesson is to act on the first signs of stanchezza rather than waiting for confirmation of the reversal.'
  source_files:
  - live-trading-crypto-analisi/015-medium.yml
- id: BULL_LTCRA_16_CTX_01
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - ema60
  - second_touch
  - probability
  source:
    timecode: '~'
  rationale: After an extended downtrend, the first EMA 60 touch often gets rejected. The second touch has higher probability
    because it signals buyers are willing to defend the level. But the market can still override any probability edge.
  notes: ''
  statement: The 2nd touch of EMA 60 after a long downtrend is a high-probability long setup. However, high probability does
    not mean guaranteed. Always protect with stop at zero to limit downside when the high-probability setup fails.
  source_files:
  - live-trading-crypto-analisi/016-medium.yml
- id: BULL_LTCRA_16_CTX_02
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - intelligent_trade
  - loss
  - close_stop
  source:
    timecode: '~'
  rationale: Bull explicitly calls out that even losing trades from lateralizzazione above EMA 60 with close stops are intelligent
    trades. The small risk relative to the potential reward justifies the entry regardless of outcome.
  notes: ''
  statement: A trade that results in a loss can still be an intelligent trade if the stop was very close and the setup was
    sound. The quality of a trade is measured by the setup and risk management, not solely by the outcome.
  source_files:
  - live-trading-crypto-analisi/016-medium.yml
- id: BULL_LTCRA_17_CTX_01
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - ema60
  - reliability
  - assessment
  source:
    timecode: '~'
  rationale: An EMA that gets repeatedly violated is no longer respected by the market. Continuing to use it as a reference
    leads to false signals. The lower highs pattern provides a more reliable framework when EMA 60 is compromised.
  notes: ''
  statement: EMA 60 reliability must be assessed before using it as a reference. If price has crossed above and below EMA
    60 multiple times recently, it has lost its significance as dynamic support/resistance. Switch to structural levels like
    lower highs or lower lows instead.
  source_files:
  - live-trading-crypto-analisi/017-medium.yml
- id: BULL_LTCRA_18_CTX_02
  entity_type: WARNING
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - overconfidence
  - probability
  - reversal
  source:
    timecode: '~'
  rationale: High-probability patterns create a temptation to jump in early. Waiting for confirmation sacrifices a small amount
    of potential profit but eliminates the risk of the rare failure. Discipline on entry timing separates consistent traders
    from gamblers.
  notes: ''
  statement: Even a 99.9% probability pattern requires confirmation via the next candle before entry. Never enter on the finta
    candle itself. The confirmation candle is the difference between acting on probability and acting on emotion.
  source_files:
  - live-trading-crypto-analisi/018-medium.yml
- id: BULL_LTCRA_19_CTX_01
  entity_type: WARNING
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - mega_support
  - retail_trap
  - psychology
  source:
    timecode: 01:00-03:00
  rationale: The mega support acts as a magnet for retail longs, whose stops below become the cascade fuel. The counter-intuitive
    move is to short before the support, not to buy on it.
  notes: ''
  statement: Do NOT buy on a mega support when price has already lateralized near it. Retail traders see 100M USD of support
    and go long, but they become fuel for the cascade. Buyers position above the support and all put stops below it, creating
    the exact conditions for a violent break.
  source_files:
  - live-trading-crypto-analisi/019-medium.yml
- id: BULL_LTCRA_19_CTX_02
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - ema60
  - 30min
  - colpo_sicuro
  source:
    timecode: 10:00-12:00
  rationale: Extended bearish periods below EMA 60 create strong seller positioning. When price finally reclaims and holds
    EMA 60, it signals a genuine shift in market structure, making longs very high probability.
  notes: ''
  statement: The 30-minute lateralizzazione above EMA 60, after price has been below EMA 60 for an extended period, is one
    of Bull's highest-conviction long setups. He calls it 'colpo sicuro' (guaranteed shot). The extended time below EMA 60
    makes the regime change above it extremely significant.
  source_files:
  - live-trading-crypto-analisi/019-medium.yml
- id: BULL_LTCRA_20_CTX_01
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - ema60
  - crypto
  - precision
  source:
    timecode: 04:30-05:30
  rationale: EMA 60 on crypto has empirically proven to produce precise bounces and rejections. The choice of 60 over the
    more conventional 50 is based on observed precision in crypto specifically.
  notes: ''
  statement: In crypto, EMA 60 works with perfezione (perfection). This is why Bull uses EMA 60 and not EMA 50 for crypto
    markets. The precision of price reactions at EMA 60 on crypto charts is remarkably consistent and forms the backbone of
    many setups.
  source_files:
  - live-trading-crypto-analisi/020-medium.yml
- id: BULL_LTCRA_20_CTX_02
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - proportion
  - target
  - candle_size
  source:
    timecode: 07:00-08:00
  rationale: Markets tend to move in proportional legs. By measuring the candle bodies of the initial impulse, traders can
    set realistic targets for the continuation without relying on arbitrary round numbers.
  notes: ''
  statement: 'Estimate targets using proportion-based analysis: measure the size of the impulse candles that created the move
    and project similar-sized moves for continuation. Candle body sizes give a proportional expectation for how far the next
    leg can extend.'
  source_files:
  - live-trading-crypto-analisi/020-medium.yml
- id: BULL_LTCRA_20_CTX_03
  entity_type: WARNING
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - loss
  - risk_management
  - psychology
  source:
    timecode: 10:00-11:00
  rationale: Trading psychology demands reframing losses. A -67 loss with a close stop on a valid setup is superior to a -500
    loss from holding a bad position. Cut losses short, let winners run.
  notes: ''
  statement: A loss with a close stop is an intelligent trade, not a failure. The key metric is not win rate but the size
    of losses versus gains. Close stop = small loss = you live to trade another day. The only bad loss is a large one from
    a wide stop on a low-conviction setup.
  source_files:
  - live-trading-crypto-analisi/020-medium.yml
- id: BULL_LTCRA_21_CTX_01
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - ico
  - book
  - chart_useless
  source:
    timecode: 00:30-02:00
  rationale: Technical analysis requires historical data. On the first minutes of a new listing, there is none. The book becomes
    the only source of truth, but it must be raggruppato to see the aggregate picture, not individual price levels.
  notes: ''
  statement: On a brand new listing or ICO, the chart is completely useless. There is no history, no EMAs, no support/resistance.
    The only tool available is the order book, raggruppato heavily, reading quantities only. Price levels on a new listing
    are meaningless; what matters is the balance of buy vs sell pressure measured in quantities.
  source_files:
  - live-trading-crypto-analisi/021-medium.yml
- id: BULL_LTCRA_21_CTX_02
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - consolidation
  - hold
  - dritto_per_dritto
  source:
    timecode: 08:30-09:30
  rationale: Consolidation within a trend is healthy and shows orderly accumulation. Dritto per dritto moves are often driven
    by panic buying or short squeezes and reverse sharply when momentum runs out.
  notes: ''
  statement: The pattern of a move determines how long to hold. If price consolidates between legs (pauses, builds bases,
    then continues), the position can be held longer because each consolidation confirms buyer commitment. If price goes dritto
    per dritto (straight without pauses), exit fast because the move is unsustainable.
  source_files:
  - live-trading-crypto-analisi/021-medium.yml
- id: BULL_LTCRA_22_CTX_01
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - failed_strength
  - psychology
  - confirmation
  source:
    timecode: 01:00-03:00
  rationale: Markets reveal their true direction through what they fail to do, not just what they do. Expected bullish behavior
    that fails to materialize exposes hidden selling pressure that is stronger than the visible bullish catalysts.
  notes: ''
  statement: A failed strength demonstration is more powerful than a direct weakness signal. When the market SHOULD go up
    (after reclaiming EMA 60, after positive news, after support hold) but DOESN'T produce a strong candle, this absence of
    expected strength is a reliable short signal. Two failed demonstrations in sequence make it highly reliable.
  source_files:
  - live-trading-crypto-analisi/022-medium.yml
- id: BULL_LTCRA_22_CTX_02
  entity_type: WARNING
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - re_entry
  - patience
  - discipline
  source:
    timecode: 13:00-15:00
  rationale: Post-profit euphoria creates a bias toward seeing setups that are not there. The edge came from the original
    setup; without a fresh setup, re-entry is gambling, not trading.
  notes: ''
  statement: Do not re-enter immediately after closing a profitable trade in the same instrument. The temptation is strong
    after a winning trade, but the setup that generated the original entry has already played out. Wait for a completely new
    setup to form before considering re-entry.
  source_files:
  - live-trading-crypto-analisi/022-medium.yml
- id: BULL_LTCRA_23_CTX_01
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - holding_time
  - scalping
  - less_is_better
  source:
    timecode: 03:30-04:30
  rationale: Scalping edge comes from catching short-term momentum. Holding beyond the impulse move exposes the position to
    diminishing returns and increasing risk. The profit per unit of time decreases the longer you hold.
  notes: ''
  statement: Less holding time is better for scalping. The longer you hold a scalp trade, the more exposed you are to random
    noise, news events, and mean reversion. Get in, take the move, get out. Bull exited the DOGE long after just 4 candles
    with +484, emphasizing that speed of execution and short hold times are virtues.
  source_files:
  - live-trading-crypto-analisi/023-medium.yml
- id: BULL_LTCRA_23_CTX_02
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - stop_placement
  - logic
  - invalidation
  source:
    timecode: 01:00-02:30
  rationale: Logical stops align risk management with the trade thesis. If the stop is hit, it means the thesis was wrong,
    which is a clean invalidation. Arbitrary stops create situations where you get stopped out even though the thesis is still
    valid.
  notes: ''
  statement: Stop placement should be based on where the trade thesis is invalidated, not on arbitrary levels or maximum loss
    tolerance. For a breakout long, the stop goes where the uptrend logic fails. For a short on exhaustion, the stop goes
    above the book resistance wall. Every stop must have a logical reason tied to the specific setup.
  source_files:
  - live-trading-crypto-analisi/023-medium.yml
- id: BULL_LTCRA_24_CTX_02
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - timeframe
  - execution
  - direction
  source:
    timecode: 00:00-00:45
  rationale: The daily provides the macro context (is the trend valid?), while the 1-minute provides the micro timing (when
    exactly to enter). Confusing the two leads to either missed entries or wrong-direction trades.
  notes: ''
  statement: Use the daily timeframe for directional bias and setup identification (cambio candela, EMA 5 hold, new highs).
    Use the 1-minute timeframe for precise execution timing and entry/exit management.
  source_files:
  - live-trading-crypto-analisi/024-medium.yml
- id: BULL_LTCRA_24_CTX_03
  entity_type: WARNING
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - resistance
  - numero_pari
  - psychology
  source:
    timecode: 03:00-03:30
  rationale: Round numbers concentrate enormous sell orders from both retail and institutional participants. The probability
    of clean breakout on first touch is low, making it essential to secure profit before the wall.
  notes: ''
  statement: Round numbers (numeri pari) like 1.00, 0.50, 10.00 act as mega resistance levels in crypto. Never set a target
    at or above a round number on the first approach. Always take profit just below.
  source_files:
  - live-trading-crypto-analisi/024-medium.yml
- id: BULL_LTCRA_25_CTX_01
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - ico
  - ipo
  - technique
  - universal
  source:
    timecode: 09:30-11:00
  rationale: The pattern of early-holder discharge followed by bounce is driven by human behavior (profit-taking urgency),
    not by asset class specifics. This makes it applicable across all markets.
  notes: ''
  statement: 'This ICO/IPO first-day book-reading technique is universal. It works identically for crypto ICO listings, stock
    IPOs, and any other first-day-of-trading instrument. The underlying mechanics are the same: early holders want to sell,
    they show urgency in the book, eventually they exhaust, and the first bounce offers a trade.'
  source_files:
  - live-trading-crypto-analisi/025-medium.yml
- id: BULL_LTCRA_25_CTX_02
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - speed
  - execution
  - ico
  source:
    timecode: 08:00-09:00
  rationale: At ICO/IPO open, prices move in seconds. Manual price entry is too slow. Using the click-on-book-price shortcut
    saves critical seconds and reduces the risk of missing the entry or exit level.
  notes: ''
  statement: 'Speed is everything on first-day listings. LINA was bought 2 minutes 11 seconds after open and sold 49 seconds
    later. Use platform shortcuts: click on the book price to auto-fill your order price (Binance trick) instead of typing
    manually.'
  source_files:
  - live-trading-crypto-analisi/025-medium.yml
- id: BULL_LTCRA_25_CTX_03
  entity_type: WARNING
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - ico
  - chart
  - beginner
  source:
    timecode: 01:00-02:00
  rationale: Chart analysis requires historical data to be meaningful. At listing open, all chart-based indicators are mathematically
    meaningless. Only the order book provides real-time supply/demand information.
  notes: ''
  statement: Never use chart-based analysis (EMAs, patterns, candles) in the first minutes of an ICO/IPO. There is no meaningful
    chart history. Traders who try to apply chart techniques to a 2-minute-old chart are guaranteed to lose. The book is the
    only source of truth.
  source_files:
  - live-trading-crypto-analisi/025-medium.yml
- id: BULL_LTCRA_25_CTX_04
  entity_type: WARNING
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - ico
  - sellers
  - psychology
  source:
    timecode: 04:00-06:00
  rationale: ICO participants often bought at a fraction of listing price. Their willingness to sell at any price above their
    cost basis creates sustained downward pressure that overwhelms any buying attempt until their supply is depleted.
  notes: ''
  statement: Do not buy while big sellers are still actively discharging. Their ICO allocation gains are often hundreds of
    percent, giving them enormous room to lower their ask price. They will keep selling aggressively until fully exhausted.
    Buying into active discharge is buying into a falling knife.
  source_files:
  - live-trading-crypto-analisi/025-medium.yml
- id: BULL_LTCRA_26_CTX_01
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - stop_limit
  - order_type
  - execution
  source:
    timecode: 02:00-03:00
  rationale: Understanding the mechanics of stop limit orders is essential for breakout trading. The trigger-max gap should
    be small enough to get filled but large enough to account for normal spread at the breakout moment.
  notes: ''
  statement: 'A stop limit order has two price components: the trigger (stop) price that activates the order, and the limit
    (max) price that caps the execution. Set the trigger at the breakout level and the max slightly above to allow for spread
    while preventing overpay on gaps.'
  source_files:
  - live-trading-crypto-analisi/026-medium.yml
- id: BULL_LTCRA_26_CTX_02
  entity_type: GUIDELINE
  category: CONTEXT_ONLY
  scope: GLOBAL
  severity: SOFT
  tags:
  - fees
  - limit_sell
  - binance
  source:
    timecode: 06:00-06:30
  rationale: Fee optimization is part of consistent profitability. On Binance, maker fees are roughly half of taker fees.
    Over hundreds of trades, the savings compound into meaningful additional profit.
  notes: ''
  statement: Use limit sell orders instead of market sell to pay maker fees (half the taker fee on Binance). When exiting
    at a known resistance level, there is time to place a limit order rather than hitting market. This saves significant fees
    over many trades.
  source_files:
  - live-trading-crypto-analisi/026-medium.yml
