  source:
    timecode: '~'
  rationale: Finte create new trigger levels. Recognizing this allows traders to immediately recalibrate after a failed setup
    rather than sitting idle.
  notes: ''
  statement: After a finta, the level where the fake breakout occurred becomes a trigger level. If price returns and breaks
    that level with a candle close, trade in the direction of the break.
  source_files:
  - live-trading-crypto-analisi/003-medium.yml
