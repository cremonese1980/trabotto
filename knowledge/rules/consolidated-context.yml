  - psychology
  source:
    timecode: 01:30-02:15
  rationale: Understanding why certain levels produce more explosive moves helps traders size up on the highest-probability
    setups.
  notes: ''
  statement: 'When yesterday''s highs equal all-time highs, the breakout potential is maximized. Two independent catalysts
    stack: recent momentum (yesterday''s highs) and structural significance (ATH).'
  source_files:
  - live-trading-crypto-analisi/008-medium.yml
- id: BULL_LTCRA_09_CTX_03
