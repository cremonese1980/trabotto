    applicability:
      timeframes: []
      market_regime: []
    rationale: "Per posizioni grandi rispetto alla liquidita visibile nel book, usare ordini iceberg (mostrando solo 1/4 della size) per non spaventare il mercato e per essere eseguiti senza slippage."
    notes: "Esempio: 82.000 USDT di posizione, iceberg da 20.000 (1/4). Nel book si vedono solo 15.000 ma l'iceberg permette di entrare senza impatto. Per uscire, stessa logica: l'iceberg filtra immediatamente anche con poco nel book."

  - id: BULL_LTCA_04_05
