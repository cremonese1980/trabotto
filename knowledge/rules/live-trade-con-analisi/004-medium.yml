    applicability:
      timeframes: [1m]
      market_regime: []
    rationale: "Quando sia la EMA 10 che la EMA 60 sono pulite e il prezzo ha rotto la 60 al rialzo con la 10 che comanda perfettamente, l'ingresso long al retest del livello di rottura ha doppio supporto EMA."
    notes: "Il doppio supporto (EMA 10 + EMA 60) e il motivo per entrare QUI invece di aspettare il bad: lo stop e vicinissimo (sotto la 60) e hai due reti di sicurezza. L'ingresso era prima del livello bad, proprio perche le due EMA pulite davano fiducia."

  - id: BULL_LTCA_04_02
    entity_type: RULE
    category: MACHINE_EXECUTABLE
    scope: TRADE_EXECUTION
    severity: HARD
    tags: [ema, ema60, invalidation, candle_pattern]
    source:
      timecode: "02:07-04:16"
    conditions:
      - "position_long == true"
      - "ema60_as_support == true"
      - "candle_spike_below_ema60 == true"
      - "candle_closes_above_ema60 == true"
    action:
      - WAIT
    applicability:
      timeframes: [1m]
      market_regime: []
    rationale: "Se il prezzo fa uno spike sotto la EMA 60 ma la candela CHIUDE sopra, e una finta: si resta in posizione. Lo spike sotto non conta; conta solo la chiusura della candela."
    notes: "Esempio live: il prezzo e sceso sotto la 60, Bull aveva la mano sul bottone di vendita, ma ha aspettato la chiusura candela. Mancavano 43 secondi, la candela e tornata sopra. Regola: 'Non deve fare chiusura a candela sotto, mi puo fare uno spike ma non mi puo fare chiusura.' Bull abbassa il prezzo di uscita preventivamente ma non clicca finche la candela non chiude."

  - id: BULL_LTCA_04_03
    entity_type: RULE
    category: MACHINE_EXECUTABLE
    scope: TRADE_EXECUTION
    severity: HARD
    tags: [trigger, reversal, invalidation]
    source:
      timecode: "04:50-05:08"
    conditions:
      - "finta_level_established == true"
      - "price_returns_to_finta_level == true"
    action:
      - EXIT_POSITION
    applicability:
      timeframes: [1m]
      market_regime: []
    rationale: "Una volta che si e stabilito un livello di finta (spike sotto che e tornato sopra), se il prezzo torna a quel livello NON aspettare un'altra chiusura candela: uscire subito, perche quel livello e diventato trigger per lo short."
    notes: "Prima finta: aspetti chiusura candela. Seconda volta che torna al livello della finta: esci immediatamente. Il livello della finta diventa un 'ottimo livello per andare short', quindi restare long e autolesionismo."

