summary:
  total_machine_executable: 5
  total_context_only: 2
  core_message: "Il doppio supporto EMA (10 + 60 pulite) giustifica l'ingresso prima del bad classico. La finta intra-candela si gestisce aspettando la chiusura: spike sotto non conta, chiusura sotto si. Il livello della finta diventa trigger per la direzione opposta. Ordini iceberg per posizioni grandi. Spike nel book secondario non contano se non confermati nel primario."
