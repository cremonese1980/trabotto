    applicability:
      timeframes: [1m]
      market_regime: []
    rationale: "Quando il breakout fa lo spike solo nel book denominato in boost ma non in USDT, non e un vero breakout: il livello trigger non e stato rotto nel grafico di riferimento. Se l'avesse fatto in USDT si sarebbe venduto."
    notes: "Distinzione critica su Binance: lo stesso titolo puo avere grafici diversi in USDT e in boost (BTC). Uno spike nel grafico secondario (boost) non conta se non si riflette nel primario (USDT). Il trigger vale solo sul grafico su cui si opera."

