summary:
  total_machine_executable: 6
  total_context_only: 2
  core_message: "Il punto trigger è un livello di prezzo dove convergono due forze (nuovi ingressi + chiusura posizioni contrarie), creando un'esplosione. Se il trigger fallisce (chiusura candela sotto il livello), è un segnale forte per l'operazione inversa. L'ingresso va calibrato sul book."
