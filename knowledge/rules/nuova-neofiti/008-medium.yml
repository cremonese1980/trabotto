summary:
  total_machine_executable: 4
  total_context_only: 4
  core_message: "Bitcoin è l'indice di riferimento per le crypto (Nasdaq per il resto). La forza relativa dell'altcoin rispetto a BTC determina la direzione operativa: long se più forte, short se più debole. Mai entrare su un'altcoin quando BTC è in pericolo di crollo."
