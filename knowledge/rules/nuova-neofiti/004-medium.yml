  core_message: "Le 4 EMA di Bull (5, 10, 60, 223 per crypto) definiscono la struttura del trend: ogni EMA rappresenta un livello di forza dei compratori. Quando un'EMA non tiene, il prezzo scende alla successiva. Il terzo tocco su un'EMA è altamente probabile che la rompa."
