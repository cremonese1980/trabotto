  # === CONTEXT-ONLY ===
  - id: BULL_NN_09_CTX_01
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [book, beginner]
    source:
      timecode: "02:26-03:25"
    statement: "Il book (order book) è la tabella che mostra tutti gli ordini di acquisto e vendita presenti sul mercato: è come guardare dalla finestra del negozio per vedere quanti camion di scarpe arrivano e quanti pullman di cinesi con cash."
    rationale: "Definizione fondamentale del book come strumento di trasparenza sul mercato."

  - id: BULL_NN_09_CTX_02
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [book, beginner]
    source:
      timecode: "03:25-04:22"
    statement: "Il book è diviso in bid (compratori, verde) e ask (venditori, rosso). Ogni livello mostra il prezzo e la quantità che qualcuno è disposto a comprare o vendere."
    rationale: "Struttura base del book che il neofita deve imparare a riconoscere."

  - id: BULL_NN_09_CTX_03
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [book, beginner]
    source:
      timecode: "08:06-09:34"
    statement: "Un market order (ordine a mercato) compra o vende immediatamente al prezzo disponibile, consumando i livelli del book dal più vicino al più lontano; non appare nel book perché viene eseguito istantaneamente."
    rationale: "Distinguere market order da limit order è cruciale per capire come si muove il prezzo nel book."

  - id: BULL_NN_09_CTX_04
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [book, beginner]
    source:
      timecode: "12:42-15:18"
    statement: "Se hai fretta di comprare e nel book il primo livello ha solo 1.500 dollari ma tu ne vuoi 10.000, consumerai più livelli facendo salire il prezzo. Se non hai fretta, metti un limit order più in basso e aspetti che il prezzo scenda."
    rationale: "Spiega la meccanica di come gli ordini a mercato muovono il prezzo attraverso i livelli del book."

  - id: BULL_NN_09_CTX_05
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [book, beginner]
    source:
      timecode: "05:01-06:11"
    statement: "Lo spread è la differenza tra il miglior prezzo di acquisto e il miglior prezzo di vendita. Più compratori e venditori ci sono, più lo spread è basso; meno ce ne sono, più è alto."
    rationale: "Lo spread influisce direttamente sulla profittabilità dello scalping."

summary:
  total_machine_executable: 6
  total_context_only: 5
  core_message: "Il book mostra la realtà di domanda e offerta: livelli grandi fungono da supporto/resistenza. Il terzo tocco nel book corrisponde al consumo progressivo di un livello grande. Lo spoofing (livelli che si spostano) va riconosciuto e ignorato. Il book conferma o invalida le conformazioni grafiche."
