    tags: [beginner, daily]
    source:
      timecode: "08:41-09:15"
    statement: "I timeframe utilizzati da Bull sono: 1 minuto, 5 minuti, 30 minuti, 1 ora, 4 ore, daily, weekly, mensile. Il daily è il più importante di tutti perché ogni candela registra il movimento di un intero giorno."
    rationale: "La gerarchia dei timeframe è fondamentale per la pianificazione operativa."

  - id: BULL_NN_05_CTX_02
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [beginner, scalping]
    source:
      timecode: "09:15-09:37"
    statement: "Bull parte sempre dal timeframe 30 minuti per cercare conformazioni, poi verifica nel daily se ci sono EMA in testa che potrebbero bloccare il trade."
    rationale: "Il workflow operativo standard prevede TF 30m per le entry e daily per la conferma direzionale."

  - id: BULL_NN_05_CTX_03
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [beginner, scalping]
    source:
      timecode: "09:21-10:32"
    statement: "Bull usa la classifica 24 ore (non daily) per trovare i titoli con le migliori performance: la classifica 24h calcola la variazione rispetto a esattamente 24 ore fa, non dalla chiusura della candela daily."
    rationale: "La differenza tra classifica 24h e daily è significativa: 24h dà il quadro più aggiornato del momentum."

summary:
  total_machine_executable: 5
  total_context_only: 3
  core_message: "La scelta del timeframe giusto è critica: se un grafico è sporco a un TF basso, si sale fino a trovare pulizia. Il workflow è: classifica 24h per trovare i titoli, TF 30m per le conformazioni, daily per verificare assenza di EMA in testa."
