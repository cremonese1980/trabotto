  core_message: "Lo short selling permette di guadagnare quando il prezzo scende, raddoppiando le opportunità operative. Il rischio teoricamente illimitato è controllato con stop loss e take profit obbligatori. La rottura dell'EMA 10 è un segnale chiave per entrare short."
