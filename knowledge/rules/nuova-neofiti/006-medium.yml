    rationale: "Principio di diversificazione e opportunità: anche nei crash c'è sempre qualcosa su cui operare long."

  - id: BULL_NN_06_CTX_07
    entity_type: GUIDELINE
    category: CONTEXT_ONLY
    scope: GLOBAL
