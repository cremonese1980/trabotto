    category: CONTEXT_ONLY
    scope: GLOBAL
    tags: [beginner, scalping]
    source:
      timecode: "12:06-12:30"
    statement: "Nello short selling: vendi prima a un prezzo alto, poi ricompri a un prezzo più basso. Esempio: vendi a 120, ricompri a 100, guadagno = 20. È l'esatto contrario del long."
    rationale: "Meccanica operativa dello short spiegata in termini semplici."

