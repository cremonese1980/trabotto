    statement: "Il broker (exchange) presta le azioni/crypto per lo short selling perché guadagna sulle fee degli scambi aggiuntivi. Chi detiene l'asset in portafoglio lo mette a disposizione ricevendo una piccola fee, e lo riavrà indietro a fine giornata."
    rationale: "Spiega la meccanica del prestito titoli dietro lo short selling."

