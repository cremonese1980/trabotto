    tags: [risk_management, beginner]
    source:
      timecode: "22:08-24:50"
    statement: "Nel long senza leva il massimo che puoi perdere è il capitale investito (il prezzo va a zero). Nello short la perdita è teoricamente illimitata (il prezzo può salire all'infinito). Tuttavia con stop loss e take profit questo rischio è controllato."
    rationale: "Avvertimento fondamentale sul rischio asimmetrico dello short selling, mitigato dalla disciplina operativa."

