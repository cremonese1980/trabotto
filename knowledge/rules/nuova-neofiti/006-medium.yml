    statement: "Lo short selling raddoppia le possibilità operative: si può guadagnare sia a rialzo (long) che a ribasso (short), riducendo lo stress e l'ansia di dover aspettare solo rialzi."
    rationale: "Avere entrambe le direzioni disponibili è un vantaggio competitivo significativo per lo scalper."

  - id: BULL_NN_06_CTX_03
