    statement: "On days when the cavallo pazzo exists, trade it. On days without one, search daily charts for the next candidate or simply rest and study. Alternating between active trading and study days is the sustainable approach."
    rationale: "Sustainability in trading requires rest periods. Forced daily trading leads to burnout and poor decisions."

summary:
  total_machine_executable: 5
