  core_message: "The cavallo pazzo technique is a meta-strategy: apply existing techniques (terzo tocco, bud, breakout) only on assets moving 30%+ daily for proportionally larger and easier gains. On quiet days without a cavallo pazzo, search daily charts for compression patterns that could produce the next big mover, or simply rest."
