summary:
  total_machine_executable: 6
  total_context_only: 3
  core_message: "The finta technique identifies fakeout breaks of EMA 10 (or EMA 223 for shorts) during clean trends. A brief break followed by a large buy/sell wall in the order book or a hammer candle confirms the fakeout. The prerequisite is a perfectly clean prior trend with precise EMA respect. Avoid this on messy charts."
