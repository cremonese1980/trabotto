    rationale: "When a massive daily candle (50%+) makes new all-time highs, opens red next day (panic sellers exit), then recovers and breaks the prior high, the current day candle will likely be even larger than the prior one."
    notes: "This proportional candle rule only applies at all-time highs where there is no overhead resistance. The red open that scares out weak hands followed by recovery signals extreme strength. Only enter after the red dip has occurred, never on the second touch of the high directly."

