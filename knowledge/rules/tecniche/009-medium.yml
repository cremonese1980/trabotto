      market_regime: [trend_down]
    rationale: "After three or more lower highs, the break below support triggers the short entry. Stop is above the pattern high."
    notes: "Can enter at the second lower high but stop is further away. At the third, conviction is higher and stop is closer. EMA 60 is not reliable as stop if price has been going above it."

