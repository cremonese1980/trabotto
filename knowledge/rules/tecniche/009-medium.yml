summary:
  total_machine_executable: 6
  total_context_only: 2
  core_message: "Short trading requires identifying lower highs (descending tops) with lateralization. Enter short on the break below support after three lower highs, or on a finta where a green candle fails above EMA 60 and returns below it. Always move stop to breakeven after the initial drop."
