video:
  id: YT_BULL_TECNICHE_002
  series: tecniche
  title: "Tecnica della candelina: ingresso, stop stretto e gestione base"
  video_index: 2
  duration_minutes: 18

entities:
  - id: BULL_T_02_01
    entity_type: RULE
    category: MACHINE_EXECUTABLE
    scope: PRE_FILTER
    severity: HARD
    tags: [candelina, beginner, trigger, candle_pattern]
    source:
      timecode: "01:32-01:43"
    conditions:
      - timeframe_minutes < 5
    action:
      - SKIP_TRADE
    applicability:
      timeframes: ["5m+"]
      market_regime: []
    rationale: "Bull impone timeframe minimo 5 minuti per ridurre finte rispetto a 1 minuto."
    notes: "Gli esempi a 1m sono solo dimostrativi, non operativi per neofiti."

  - id: BULL_T_02_02
    entity_type: SETUP
    category: MACHINE_EXECUTABLE
    scope: TRADE_EXECUTION
    severity: HARD
    tags: [candelina, trigger, stop_loss, candle_pattern]
    source:
      timecode: "02:47-03:02"
    conditions:
      - small_candle_detected == true
      - candle_size_pct <= user_max_stop_pct
      - breakout_above_small_candle_high == true
    action:
      - ENTER_LONG
    applicability:
      timeframes: ["5m", "1h", "1d"]
      market_regime: []
    rationale: "L'ingresso della tecnica avviene solo sulla rottura del massimo della candelina."
    notes: "Per short usare la rottura del minimo in contesto ribassista."

  - id: BULL_T_02_03
    entity_type: INVALIDATION
    category: MACHINE_EXECUTABLE
    scope: TRADE_EXECUTION
    severity: HARD
    tags: [candelina, stop_loss, invalidation, risk_management]
    source:
      timecode: "02:47-03:09"
    conditions:
      - position_open == true
      - price_reaches_small_candle_low == true
    action:
      - EXIT_POSITION
    applicability:
      timeframes: ["5m+"]
      market_regime: []
    rationale: "Bull definisce lo stop sul minimo della candelina: se violato, il setup è invalidato."
    notes: "Anche spike sul livello stop è considerato uscita valida."

  - id: BULL_T_02_04
    entity_type: RULE
    category: MACHINE_EXECUTABLE
    scope: MONITORING
    severity: SOFT
    tags: [position_sizing, candelina, risk_management, stop_loss]
    source:
      timecode: "05:29-05:44"
    conditions:
      - small_candle_stop_pct > user_risk_limit_pct
    action:
      - REDUCE_SIZE
    applicability:
      timeframes: ["5m+"]
      market_regime: []
    rationale: "Se la candelina è ampia, Bull suggerisce ridurre size per mantenere rischio percentuale coerente."
    notes: "Esempio esplicito: stop 2% -> dimezzare size per rischio equivalente a 1%."

  - id: BULL_T_02_05
    entity_type: RULE
    category: MACHINE_EXECUTABLE
    scope: MONITORING
    severity: SOFT
    tags: [stop_loss, risk_management, candelina, take_profit]
    source:
      timecode: "05:14-05:18"
    conditions:
      - position_open == true
      - strong_acceleration_after_entry == true
    action:
      - MOVE_SL_TO_BREAKEVEN
    applicability:
      timeframes: ["5m+"]
      market_regime: []
    rationale: "Dopo strappo favorevole, Bull protegge il trade spostando lo stop a pareggio."
    notes: "Confermata più volte nel video come gestione base post-ingresso."

summary:
  total_machine_executable: 5
  total_context_only: 0
  core_message: "La candelina è proposta come tecnica base per neofiti: ingresso oggettivo, stop ravvicinato e gestione rischio meccanica. La priorità è standardizzare esecuzione e perdere poco quando il segnale fallisce."
