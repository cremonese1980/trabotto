rules:
- id: BULL_T_14_06
  entity_type: INVALIDATION
  category: MACHINE_EXECUTABLE
  scope: PRE_FILTER
  severity: HARD
  tags:
  - bicicletta
  - ema60
  - daily
  - invalidation
  - resistance
  source:
    timecode: 11:02-11:59
  conditions:
  - daily_candle_immediately_near_ema60_resistance == true
  - lateralization_near_ema60 == true
  - no_room_for_trend_before_ema60 == true
  action:
  - SKIP_TRADE
  applicability:
    timeframes:
    - daily
    market_regime: []
  rationale: If the daily chart shows EMA 60 acting as immediate resistance with no room for the trend to develop, the bicicletta
    will hit resistance too quickly.
  notes: The bicicletta needs space for the trend to develop. If EMA 60 resistance is right above the entry, the trade has
    no room and will likely reverse into your distant stop.
  source_files:
  - tecniche/014-medium.yml
- id: BULL_T_12_01
  entity_type: SETUP
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bicicletta
  - daily
  - cambiocolore
  - ema5
  - scalping
  source:
    timecode: 01:35-02:26
  conditions:
  - timeframe == daily
  - previous_daily_candle_body_size == LARGE
  - daily_candle_opened_in_red == true
  - price_approaching_ema5_daily == true OR price_tested_ema5_daily == true
  - price_starting_to_rise == true
  action:
  - ENTER_LONG
  stop_loss: Below EMA 60 on 5-minute timeframe at entry time
  applicability:
    timeframes:
    - 5m
    - daily
    market_regime: []
  rationale: The bicicletta setup combines daily candle color change with 5m EMA 60 as stop, allowing hands-off management.
  notes: Entry in the morning when the daily candle is still red, near EMA 5 daily. Use 5m timeframe for stop placement, not
    1m. This is designed for when you will be away for hours.
  source_files:
  - tecniche/012-medium.yml
- id: BULL_T_12_02
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bicicletta
  - ema60
  - stop_loss
  - risk_management
  source:
    timecode: 02:38-02:54
  conditions:
  - bicicletta_setup_active == true
  - timeframe_for_stop == 5m
  action:
  - ENTER_LONG
  stop_loss: Below EMA 60 on 5-minute chart
  applicability:
    timeframes:
    - 5m
    market_regime: []
  rationale: EMA 60 on 5m provides enough distance for natural volatility while giving a defined exit.
  notes: When going away for hours, use 5m timeframe minimum. Never use 1m for this technique. The EMA 60 on 5m gives room
    for spikes while protecting against real breakdowns.
  source_files:
  - tecniche/012-medium.yml
- id: BULL_T_12_05
  entity_type: SETUP
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bicicletta
  - ema10
  - daily
  - breakout
  - retest
  source:
    timecode: 06:47-09:27
  conditions:
  - timeframe == daily
  - ema10_daily_has_held_as_support_multiple_days == true (no wick violations OR only consistent wick violations at same level)
  - price_breaks_above_ema10_daily == true
  action:
  - ENTER_LONG
  applicability:
    timeframes:
    - daily
    market_regime: []
  rationale: When EMA 10 on daily holds cleanly for multiple days without being spoiled by wicks, its breakout is a strong
    entry signal.
  notes: 'Key distinction: if wicks keep poking through EMA 10, look at the consistent wick level as the real breakout point
    instead. If EMA 10 holds cleanly (no dirty wicks), the EMA 10 break itself is the entry.'
  source_files:
  - tecniche/012-medium.yml
- id: BULL_T_14_01
  entity_type: SETUP
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bicicletta
  - daily
  - ema5
  - breakout
  - trend
  source:
    timecode: 01:24-02:13
  conditions:
  - timeframe == daily
  - daily_candle_is_green == true
  - price_above_previous_day_open == true
  - price_targeting_ema10_daily_from_below == true
  - ema5_daily_broken_previous_day == true
  action:
  - CLASSIFY_SETUP
  applicability:
    timeframes:
    - daily
    - 1m
    market_regime:
    - bullish
  rationale: 'Bicicletta starts from identifying a daily trend: previous day broke EMA 5, today is green and targeting EMA
    10.'
  notes: The daily provides direction; entry is then refined on 1m. In this example (THETA), EMA 5 was broken the day before,
    and the target was EMA 10 daily.
  source_files:
  - tecniche/014-medium.yml
- id: BULL_T_14_02
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bicicletta
  - ema223
  - stop_loss
  - risk_management
  source:
    timecode: 03:03-03:45
  conditions:
  - bicicletta_setup_active == true
  - entry_on_1m_timeframe == true
  action:
  - ENTER_LONG
  stop_loss: Below EMA 223 on 1-minute chart
  applicability:
    timeframes:
    - 1m
    market_regime: []
  rationale: EMA 223 on 1m provides a distant but meaningful stop for the bicicletta technique.
  notes: Alternatively, use EMA 60 on 5m chart. EMA 223 on 1m gives plenty of room for the trade to work while you are away.
    The stop is far at entry but gets raised manually over time.
  source_files:
  - tecniche/014-medium.yml
- id: BULL_T_14_03
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bicicletta
  - daily
  - ema10
  - take_profit
  source:
    timecode: 02:05-02:30
  conditions:
  - bicicletta_position_open == true
  - price_reaches_ema10_daily == true
  action:
  - EXIT_POSITION
  applicability:
    timeframes:
    - daily
    market_regime: []
  rationale: EMA 10 on daily is the natural resistance target when approaching from below after an EMA 5 breakout.
  notes: Bull exited at EMA 10 daily (4.64 for THETA). The price did break above later, but EMA 10 is a safe exit point for
    the bicicletta approach.
  source_files:
  - tecniche/014-medium.yml
- id: BULL_T_14_04
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bicicletta
  - ema60
  - daily
  - breakout
  - retest
  source:
    timecode: 07:10-07:47
  conditions:
  - timeframe == daily
  - price_broke_above_ema60_daily == true (previous days)
  - price_retested_ema60_daily == true
  - ema10_daily_acting_as_catalyst == true
  - daily_candle_slightly_negative_then_turned_positive == true
  action:
  - ENTER_LONG
  applicability:
    timeframes:
    - daily
    - 1m
    market_regime:
    - bullish
  rationale: A daily chart showing EMA 60 breakout, EMA 60 retest, and EMA 10 breakout is a strong bicicletta setup.
  notes: 'Paris Saint-Germain example: broke EMA 60, retested it, then EMA 10 acted as springboard. Daily slightly negative
    then turned positive confirmed the entry.'
  source_files:
  - tecniche/014-medium.yml
- id: BULL_T_14_05
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bicicletta
  - daily
  - ema60
  - breakout
  source:
    timecode: 08:28-08:51
  conditions:
  - timeframe == daily
  - price_tested_ema60_daily_yesterday == true AND failed == true
  - price_closed_below_ema60_yesterday == true
  - today_targeting_ema60_breakout == true
  action:
  - ENTER_LONG
  applicability:
    timeframes:
    - daily
    - 1m
    market_regime: []
  rationale: Failed EMA 60 test yesterday followed by a renewed attempt today creates a breakout bicicletta setup.
  notes: 'Juventus example: tested EMA 60 yesterday, failed, closed below. Today pointed at breakout. Entry on 1m at resistance
    breakout, stop on EMA 223 1m.'
  source_files:
  - tecniche/014-medium.yml
- id: BULL_T_14_08
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: PRE_FILTER
  severity: SOFT
  tags:
  - bicicletta
  - btc_index
  - regime_filter
  source:
    timecode: 01:54-02:05
  conditions:
  - altcoin_showing_relative_strength_vs_btc == true
  - btc_is_not_weak == true
  action:
  - CLASSIFY_SETUP
  applicability:
    timeframes:
    - daily
    market_regime: []
  rationale: Bicicletta works best when the altcoin is stronger than BTC and BTC itself is at least neutral.
  notes: Bull checks that the altcoin outperforms BTC on the daily. If BTC is strong and the alt is even stronger, the bicicletta
    has wind at its back.
  source_files:
  - tecniche/014-medium.yml
- id: BULL_T_12_03
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: SOFT
  tags:
  - bicicletta
  - take_profit
  - daily
  - breakout
  source:
    timecode: 03:27-04:05
  conditions:
  - position_open == true
  - bicicletta_setup_active == true
  action:
  - TIGHTEN_TP
  take_profit: Above previous day's high
  applicability:
    timeframes:
    - daily
    market_regime: []
  rationale: Target is set above previous day's high to catch fast spikes that exceed it.
  notes: Bull sets a limit sell slightly above the previous day's high. The idea is to capture a quick spike beyond that level.
    This is an optimistic target for when you cannot watch the screen.
  source_files:
  - tecniche/012-medium.yml
- id: BULL_T_05_03
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: MONITORING
  severity: SOFT
  tags:
  - daily
  - stop_loss
  - bicicletta
  - breakeven
  source:
    timecode: 09:22-09:34
  conditions:
  - daily_long_active == true
  - position_in_profit == true
  - bicicletta_mode == true
  action:
  - MOVE_SL_TO_BREAKEVEN
  applicability:
    timeframes:
    - 5m
    - 30m
    market_regime: []
  rationale: The bicicletta technique variant puts stop at zero immediately after entry goes in the right direction.
  notes: Bicicletta is a different technique from pure daily. With pure daily, the stop stays at EMA 10 daily or EMA 223 on
    30m. With bicicletta, stop goes to breakeven.
  source_files:
  - tecniche/005-medium.yml
- id: BULL_T_12_04
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: MONITORING
  severity: SOFT
  tags:
  - bicicletta
  - exit
  - manual
  - risk_management
  source:
    timecode: 04:31-04:47
  conditions:
  - position_open == true
  - price_drops_below_defined_threshold == true (e.g., round number or support)
  action:
  - EXIT_POSITION
  applicability:
    timeframes:
    - 5m
    market_regime: []
  rationale: Set a mental or manual stop at a clear price level in case take profit is not hit.
  notes: 'Bull imposed a manual exit rule: if price dropped below 0.007 he would sell. This discipline prevents a winning
    trade from becoming a losing one when away.'
  source_files:
  - tecniche/012-medium.yml
- id: BULL_T_14_07
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: MONITORING
  severity: SOFT
  tags:
  - bicicletta
  - stop_loss
  - trailing
  - ema223
  source:
    timecode: 10:05-10:28
  conditions:
  - bicicletta_position_open == true
  - time_elapsed_since_entry > 0
  - ema223_1m_has_risen == true
  action:
  - MOVE_SL_TO_BREAKEVEN
  applicability:
    timeframes:
    - 1m
    market_regime: []
  rationale: As time passes, EMA 223 on 1m rises, and the stop should be raised to follow it.
  notes: Bull periodically checks and manually raises the stop to match the rising EMA 223. This tightens risk over time while
    the trend works in his favor.
  source_files:
  - tecniche/014-medium.yml
- id: BULL_T_25_01
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: PRE_FILTER
  severity: HARD
  tags:
  - bomba
  - breakout
  - trend
  - position_sizing
  source:
    timecode: 03:02-04:50
  conditions:
  - bullbot_bomba_signal == true
  - price_change_24h_pct < 1.0 AND volume_change_24h_pct < 50
  - sudden_price_explosion_detected == true
  action:
  - MONITOR_LEVEL
  applicability:
    timeframes:
    - 1m
    market_regime:
    - bullish
  rationale: The bomba signal detects assets that suddenly wake up from dormancy with a large move. It provides early detection
    before the asset appears in rankings.
  notes: The bomba signal is not an entry trigger by itself. After receiving the signal, apply standard techniques (bud, terzo
    tocco, etc.) to find a proper entry point. Never enter blindly on the signal.
  source_files:
  - tecniche/025-medium.yml
- id: BULL_T_34_01
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: PRE_FILTER
  severity: HARD
  tags:
  - bomba
  - candle_pattern
  - trigger
  source:
    timecode: 02:53-03:12
  conditions:
  - signal_bomba == true
  - daily_candle_pct > 2
  action:
  - MONITOR_LEVEL
  applicability:
    timeframes: []
    market_regime: []
  rationale: Il segnale bomba identifica coppie con candele superiori al 2%, indicando che il titolo paga a sufficienza per
    operare anche con una sola candela.
  notes: 'Non si entra appena esce il segnale bomba: si aspetta sempre una conformazione.'
  source_files:
  - tecniche/034-medium.yml
- id: BULL_T_38_01
  entity_type: SETUP
  category: MACHINE_EXECUTABLE
  scope: PRE_FILTER
  severity: HARD
  tags:
  - bomba
  - breakout
  - trigger
  source:
    timecode: 01:13-04:05
  conditions:
  - new_coin_enters_top5_daily_ranking == true
  - ranking_start_from_daily_candle_change == true
  - time_after_0400_utc == true
  action:
  - MONITOR_LEVEL
  applicability:
    timeframes: []
    market_regime: []
  rationale: Il segnale cavallino avverte quando una coppia nuova entra nei primi 5 della classifica giornaliera, potenziale
    cavallo pazzo del giorno.
  notes: 'Non si entra appena arriva il segnale. Si aspetta conformazione: terzo tocco, lateralizzazione, bud. Funziona come
    bomba evoluta che non richiede candela sopra il 2%.'
  source_files:
  - tecniche/038-medium.yml
- id: BULL_T_25_02
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bomba
  - bud
  - candle_pattern
  - breakout
  source:
    timecode: 05:04-06:06
  conditions:
  - bullbot_bomba_signal == true
  - first_spike_completed == true
  - lateralization_after_spike == true
  - bud_structure_formed == true (spike + 2 rest candles)
  action:
  - ENTER_LONG
  applicability:
    timeframes:
    - 1m
    market_regime:
    - bullish
  rationale: 'After a bomba signal, the best entry is a bud structure: wait for the initial spike, then a lateralization,
    then enter on the breakout of the lateralization level.'
  notes: 'Example: FOURTH signal arrived, first possible bud entry was on the lateralization breakout with stop below the
    consolidation. Combined bomba detection with bud execution.'
  source_files:
  - tecniche/025-medium.yml
- id: BULL_T_25_03
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bomba
  - candle_pattern
  - retest
  - breakout
  source:
    timecode: 08:30-09:14
  conditions:
  - bullbot_bomba_signal == true
  - first_spike_completed == true
  - rest_candle_after_spike >= 1
  - price_exceeds_rest_candle_high == true
  action:
  - ENTER_LONG
  applicability:
    timeframes:
    - 1m
    market_regime:
    - bullish
  rationale: After a bomba spike, wait for at least one rest candle, then enter when price exceeds the high of the rest candle.
  notes: If historical resistance (e.g., all-time highs) is nearby, that can serve as the entry trigger instead. Reduce size
    when entering at major resistance levels.
  source_files:
  - tecniche/025-medium.yml
- id: BULL_T_25_04
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bomba
  - ema10
  - bud
  - continuation
  source:
    timecode: 11:00-12:16
  conditions:
  - bullbot_bomba_signal == true
  - initial_spike_completed == true
  - price_pulled_back_below_ema10 == true
  - lateralization_below_ema10 == true
  - price_breaks_above_lateralization == true
  action:
  - ENTER_LONG
  applicability:
    timeframes:
    - 1m
    market_regime:
    - bullish
  rationale: The ideal bomba entry is when the asset spikes, pulls back below EMA 10, lateralizes, then breaks out again to
    make new highs. This is the maximum conviction entry for full size.
  notes: This pattern combines bomba detection with the classic bud retracement structure. Bull describes this as the ideal
    scenario where he enters all-in. It does not happen often but produces the largest gains.
  source_files:
  - tecniche/025-medium.yml
- id: BULL_T_34_02
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bomba
  - trigger
  - breakout
  source:
    timecode: 06:23-06:57
  conditions:
  - signal_bomba == true
  - conformazione_detected == true
  action:
  - ENTER_LONG
  applicability:
    timeframes: []
    market_regime: []
  rationale: 'Dopo il segnale bomba si lavora solo quando c''e'' una conformazione tecnica: il segnale indica che il titolo
    paga, la conformazione indica quando entrare.'
  notes: Il segnale bomba serve per filtrare coppie che si muovono abbastanza. L'ingresso vero e proprio segue le regole delle
    conformazioni.
  source_files:
  - tecniche/034-medium.yml
- id: BULL_T_38_02
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: TRADE_EXECUTION
  severity: HARD
  tags:
  - bomba
  - terzo_tocco
  - candelina
  - trigger
  source:
    timecode: 04:34-06:09
  conditions:
  - cavallino_signal == true
  - terzo_tocco_or_lateralizzazione_or_bud == true
  action:
  - ENTER_LONG
  applicability:
    timeframes:
    - 1m
    - 5m
    market_regime: []
  rationale: Dopo il segnale cavallino, la prima conformazione valida (terzo tocco, bud, lateralizzazione) e' il momento dell'ingresso.
  notes: 'Esempio KNC: segnalato alle 8:34, primo ingresso su terzo tocco 1-2-3. Se EMA 10 viene rotta, uscita e nuovo ingresso
    su successivo terzo tocco.'
  source_files:
  - tecniche/038-medium.yml
- id: BULL_T_25_05
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: PRE_FILTER
  severity: SOFT
  tags:
  - bomba
  - all_time_high
  - daily
  - breakout
  source:
    timecode: 14:10-14:54
  conditions:
  - asset_approaching_100_day_highs == true
  - distance_to_100_day_highs_pct <= 2
  action:
  - MONITOR_LEVEL
  applicability:
    timeframes:
    - daily
    market_regime:
    - bullish
  rationale: A daily signal that an asset is within 2% of its 100-day high provides a reference target. If a breakout signal
    coincides with proximity to 100-day highs, use full size and hold for the breakout.
  notes: Beyond the 100-day highs, shorts must cover and new buyers enter, creating potential for parabolic moves. This daily
    signal complements the 1-minute bomba signal.
  source_files:
  - tecniche/025-medium.yml
- id: BULL_T_44_04
  entity_type: SETUP
  category: MACHINE_EXECUTABLE
  scope: PRE_FILTER
  severity: SOFT
  tags:
  - book
  - bomba
  - trend
  source:
    timecode: 06:46-07:14
  conditions:
  - asset_in_top5_gainers == true OR asset_in_top5_losers == true
  action:
  - MONITOR_LEVEL
  applicability:
    timeframes:
    - 1m
    - 5m
    market_regime: []
  rationale: I primi 5 migliori e peggiori in classifica sono quelli che pagano di piu'.
  notes: Sia i migliori che i peggiori sono titoli con alta volatilita' e quindi interessanti per il book trading.
  source_files:
  - tecniche/044-medium.yml
- id: BULL_T_52_06
  entity_type: RULE
  category: MACHINE_EXECUTABLE
  scope: MONITORING
  severity: SOFT
  tags:
  - bomba
  - ema10
  - candelina
  source:
    timecode: 16:15-17:08
  conditions:
  - bomba_signal_received == true
  - elapsed_candles_since_bomba >= 3
  - timeframe == "1h"
  action:
  - MONITOR_LEVEL
  applicability:
    timeframes:
    - 1h
    market_regime: []
  rationale: Dopo un segnale bomba, servono almeno 3 candele per arrivare all'EMA 10; mettere una sveglia al 50esimo minuto
    per verificare se si forma la candelina.
  notes: 'Procedura: arriva segnale bomba, metti sveglia dopo 2h50m. Ogni ora al 50esimo minuto controlla se c''e'' la candelina
    sull''EMA 10. Se non c''e'', vai avanti.'
  source_files:
  - tecniche/052-medium.yml
- id: BULL_LTCRA_08_01
  entity_type: SETUP
  category: MACHINE_EXECUTABLE
  scope: PRE_FILTER
  severity: HARD
  tags:
  - all_time_high
  - trigger
  - breakout
  source:
    timecode: 00:30-02:00
  conditions:
  - bullbot_segnale_bomba == true
  - price_approaching_yesterday_highs == true
  - yesterday_highs == all_time_highs
  action:
  - CLASSIFY_SETUP
  applicability:
    timeframes:
    - 1m
    - 5m
    market_regime:
    - trend_up
  rationale: 'Bullbot signals approaching yesterday''s highs. When yesterday''s highs coincide with all-time highs, the explosive
    potential doubles: shorts must cover AND FOMO enters.'
  notes: 'The double trigger: yesterday''s highs provide the immediate catalyst while all-time highs provide the structural
    catalyst. Both together create maximum breakout force.'
  source_files:
  - live-trading-crypto-analisi/008-medium.yml
